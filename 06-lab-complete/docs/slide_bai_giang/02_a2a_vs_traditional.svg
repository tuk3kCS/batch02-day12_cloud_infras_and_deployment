<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 920" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arrowW" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowR" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f87171"/>
    </marker>
    <marker id="arrowA" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowP" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a855f7"/>
    </marker>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="920" fill="#0f172a"/>

  <!-- Title Bar (gradient header) -->
  <rect x="0" y="0" width="1200" height="82" fill="url(#heroGrad)"/>
  <text x="600" y="38" text-anchor="middle" font-size="28" font-weight="700" fill="#f1f5f9">Multi-Agent: Traditional vs. A2A</text>
  <text x="600" y="62" text-anchor="middle" font-size="15" fill="#94a3b8">From agents locked inside a workflow to independently deployed, discoverable, scalable services</text>
  <line x1="80" y1="82" x2="1120" y2="82" stroke="#334155" stroke-width="1"/>

  <!-- ============================================================ -->
  <!-- LEFT PANEL: Traditional                                       -->
  <!-- ============================================================ -->
  <rect x="25" y="100" width="540" height="680" rx="18" fill="#1a0f0f" stroke="#ef4444" stroke-width="2"/>

  <!-- Header -->
  <rect x="25" y="100" width="540" height="52" rx="18" fill="#2d1010"/>
  <rect x="25" y="134" width="540" height="18" fill="#2d1010"/>
  <text x="295" y="132" text-anchor="middle" font-size="18" font-weight="700" fill="#f87171">Traditional Multi-Agent</text>
  <text x="295" y="148" text-anchor="middle" font-size="12" fill="#fca5a5">Single repository · Single process · Hardwired workflow</text>

  <!-- Monolith box -->
  <rect x="50" y="166" width="490" height="430" rx="12" fill="#0f0a0a" stroke="#7f1d1d" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="295" y="192" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">Monolithic Application / Single Process</text>
  <text x="295" y="210" text-anchor="middle" font-size="10" fill="#64748b">langgraph_app.py  ·  workflow.py  ·  agents.py</text>

  <!-- Orchestrator node -->
  <rect x="173" y="224" width="244" height="52" rx="10" fill="#2d1010" stroke="#ef4444" stroke-width="1.5"/>
  <text x="295" y="246" text-anchor="middle" font-size="13" font-weight="600" fill="#f87171">Orchestrator</text>
  <text x="295" y="264" text-anchor="middle" font-size="10" fill="#fca5a5">Hardcoded routing logic · imports agents directly</text>

  <!-- arrows down from orchestrator -->
  <line x1="215" y1="276" x2="135" y2="321" stroke="#7f1d1d" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <line x1="295" y1="276" x2="295" y2="321" stroke="#7f1d1d" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <line x1="375" y1="276" x2="455" y2="321" stroke="#7f1d1d" stroke-width="1.5" marker-end="url(#arrowR)"/>

  <!-- Agent A -->
  <rect x="68" y="321" width="136" height="64" rx="8" fill="#1a0a0a" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="136" y="343" text-anchor="middle" font-size="12" font-weight="600" fill="#fca5a5">Agent A</text>
  <text x="136" y="361" text-anchor="middle" font-size="10" fill="#94a3b8">Tax logic</text>
  <text x="136" y="377" text-anchor="middle" font-size="9" fill="#6b7280">class TaxAgent:</text>

  <!-- Agent B -->
  <rect x="227" y="321" width="136" height="64" rx="8" fill="#1a0a0a" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="295" y="343" text-anchor="middle" font-size="12" font-weight="600" fill="#fca5a5">Agent B</text>
  <text x="295" y="361" text-anchor="middle" font-size="10" fill="#94a3b8">Law logic</text>
  <text x="295" y="377" text-anchor="middle" font-size="9" fill="#6b7280">class LawAgent:</text>

  <!-- Agent C -->
  <rect x="386" y="321" width="136" height="64" rx="8" fill="#1a0a0a" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="454" y="343" text-anchor="middle" font-size="12" font-weight="600" fill="#fca5a5">Agent C</text>
  <text x="454" y="361" text-anchor="middle" font-size="10" fill="#94a3b8">Compliance logic</text>
  <text x="454" y="377" text-anchor="middle" font-size="9" fill="#6b7280">class ComplianceAgent:</text>

  <!-- Shared state in memory -->
  <rect x="120" y="411" width="350" height="44" rx="8" fill="#1a0a0a" stroke="#78350f" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="295" y="429" text-anchor="middle" font-size="11" fill="#fbbf24">Shared In-Process State</text>
  <text x="295" y="447" text-anchor="middle" font-size="10" fill="#64748b">Python dict / TypedDict in same process</text>
  <line x1="136" y1="411" x2="136" y2="385" stroke="#78350f" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="295" y1="411" x2="295" y2="385" stroke="#78350f" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="454" y1="411" x2="454" y2="385" stroke="#78350f" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Constraints block -->
  <rect x="68" y="476" width="454" height="108" rx="8" fill="#0f0a0a" stroke="#374151" stroke-width="1"/>
  <text x="295" y="496" text-anchor="middle" font-size="11" font-weight="700" fill="#ef4444">Constraints &amp; Pain Points</text>
  <circle cx="88" cy="514" r="4" fill="#ef4444"/>
  <text x="102" y="518" font-size="11" fill="#94a3b8">All agents must be in the same codebase and language</text>
  <circle cx="88" cy="534" r="4" fill="#ef4444"/>
  <text x="102" y="538" font-size="11" fill="#94a3b8">Scale the entire app — cannot scale one agent independently</text>
  <circle cx="88" cy="554" r="4" fill="#ef4444"/>
  <text x="102" y="558" font-size="11" fill="#94a3b8">New agent = PR to the same repo, risk of breaking others</text>
  <circle cx="88" cy="574" r="4" fill="#ef4444"/>
  <text x="102" y="578" font-size="11" fill="#94a3b8">Agent dies → entire workflow crashes</text>

  <!-- Label at bottom -->
  <text x="295" y="618" text-anchor="middle" font-size="12" fill="#7f1d1d" font-style="italic">Agents are functions, not services.</text>
  <text x="295" y="638" text-anchor="middle" font-size="12" fill="#7f1d1d" font-style="italic">They exist only inside the workflow.</text>

  <!-- Team structure: single team -->
  <rect x="68" y="658" width="454" height="48" rx="8" fill="#1a0a0a" stroke="#374151" stroke-width="1"/>
  <text x="295" y="678" text-anchor="middle" font-size="11" font-weight="700" fill="#64748b">One Team owns everything</text>
  <text x="295" y="696" text-anchor="middle" font-size="10" fill="#4b5563">All agents, all routing, all prompts in one giant repo</text>

  <!-- ============================================================ -->
  <!-- RIGHT PANEL: A2A                                             -->
  <!-- ============================================================ -->
  <rect x="635" y="100" width="540" height="680" rx="18" fill="#0a1a0f" stroke="#22c55e" stroke-width="2"/>

  <!-- Header -->
  <rect x="635" y="100" width="540" height="52" rx="18" fill="#0d2a16"/>
  <rect x="635" y="134" width="540" height="18" fill="#0d2a16"/>
  <text x="905" y="132" text-anchor="middle" font-size="18" font-weight="700" fill="#4ade80">Agent2Agent (A2A) Protocol</text>
  <text x="905" y="148" text-anchor="middle" font-size="12" fill="#86efac">Independent services · Deployed as endpoints · Discoverable · Scalable</text>

  <!-- REGISTRY (top) -->
  <rect x="753" y="168" width="304" height="62" rx="12" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <text x="905" y="194" text-anchor="middle" font-size="13" font-weight="700" fill="#94a3b8">Registry Service  :10000</text>
  <text x="905" y="212" text-anchor="middle" font-size="11" fill="#64748b">Central directory — agents register on startup</text>
  <text x="905" y="226" text-anchor="middle" font-size="10" fill="#475569">POST /register  ·  GET /discover/{"{task}"}  ·  GET /agents</text>

  <!-- Registration arrows up to registry -->
  <line x1="800" y1="306" x2="800" y2="230" stroke="#475569" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowW)"/>
  <line x1="905" y1="306" x2="905" y2="230" stroke="#475569" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowW)"/>
  <line x1="1010" y1="306" x2="1010" y2="230" stroke="#475569" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowW)"/>
  <text x="760" y="271" font-size="9" fill="#475569">register</text>
  <text x="870" y="271" font-size="9" fill="#475569">register</text>
  <text x="1015" y="271" font-size="9" fill="#475569">register</text>

  <!-- THREE INDEPENDENT SERVICE BOXES -->
  <!-- Tax Agent Service -->
  <rect x="660" y="306" width="152" height="130" rx="12" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
  <rect x="660" y="306" width="152" height="30" rx="12" fill="#2a1a3e"/>
  <rect x="660" y="324" width="152" height="12" fill="#2a1a3e"/>
  <text x="736" y="326" text-anchor="middle" font-size="12" font-weight="700" fill="#c084fc">Tax Agent</text>
  <text x="736" y="343" text-anchor="middle" font-size="10" fill="#475569">:10102</text>
  <text x="736" y="361" text-anchor="middle" font-size="10" fill="#94a3b8">Own repo · own team</text>
  <text x="736" y="377" text-anchor="middle" font-size="10" fill="#64748b">Python / LangGraph</text>
  <text x="736" y="393" text-anchor="middle" font-size="10" fill="#64748b">Scales independently</text>
  <rect x="672" y="402" width="128" height="22" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="736" y="417" text-anchor="middle" font-size="9" fill="#64748b">/.well-known/agent.json</text>

  <!-- Law Agent Service -->
  <rect x="829" y="306" width="152" height="130" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <rect x="829" y="306" width="152" height="30" rx="12" fill="#1a2e1a"/>
  <rect x="829" y="324" width="152" height="12" fill="#1a2e1a"/>
  <text x="905" y="326" text-anchor="middle" font-size="12" font-weight="700" fill="#4ade80">Law Agent</text>
  <text x="905" y="343" text-anchor="middle" font-size="10" fill="#475569">:10101</text>
  <text x="905" y="361" text-anchor="middle" font-size="10" fill="#94a3b8">Own repo · own team</text>
  <text x="905" y="377" text-anchor="middle" font-size="10" fill="#64748b">Python / LangGraph</text>
  <text x="905" y="393" text-anchor="middle" font-size="10" fill="#64748b">Scales independently</text>
  <rect x="841" y="402" width="128" height="22" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="905" y="417" text-anchor="middle" font-size="9" fill="#64748b">/.well-known/agent.json</text>

  <!-- Compliance Agent Service -->
  <rect x="998" y="306" width="152" height="130" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <rect x="998" y="306" width="152" height="30" rx="12" fill="#2a1e10"/>
  <rect x="998" y="324" width="152" height="12" fill="#2a1e10"/>
  <text x="1074" y="326" text-anchor="middle" font-size="12" font-weight="700" fill="#fbbf24">Compliance</text>
  <text x="1074" y="343" text-anchor="middle" font-size="10" fill="#475569">:10103</text>
  <text x="1074" y="361" text-anchor="middle" font-size="10" fill="#94a3b8">Own repo · own team</text>
  <text x="1074" y="377" text-anchor="middle" font-size="10" fill="#64748b">TypeScript / CrewAI</text>
  <text x="1074" y="393" text-anchor="middle" font-size="10" fill="#64748b">Scales independently</text>
  <rect x="1010" y="402" width="128" height="22" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="1074" y="417" text-anchor="middle" font-size="9" fill="#64748b">/.well-known/agent.json</text>

  <!-- Customer Agent - discover & call -->
  <rect x="783" y="460" width="244" height="62" rx="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="905" y="482" text-anchor="middle" font-size="13" font-weight="700" fill="#60a5fa">Customer Agent  :10100</text>
  <text x="905" y="500" text-anchor="middle" font-size="11" fill="#93c5fd">Discovers agents at runtime via registry</text>
  <text x="905" y="514" text-anchor="middle" font-size="10" fill="#475569">No hardcoded URLs · no direct imports</text>

  <!-- discover arrow: Customer → Registry -->
  <path d="M 875 460 Q 790 410 810 306" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowB)"/>
  <text x="770" y="418" font-size="9" fill="#3b82f6">GET /discover/</text>
  <text x="770" y="430" font-size="9" fill="#3b82f6">legal_question</text>

  <!-- delegate arrows: Customer → agents -->
  <line x1="825" y1="494" x2="766" y2="436" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <line x1="905" y1="460" x2="905" y2="436" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <line x1="985" y1="494" x2="1044" y2="436" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowB)"/>

  <!-- Benefits block -->
  <rect x="660" y="540" width="490" height="120" rx="10" fill="#0a1a0f" stroke="#374151" stroke-width="1"/>
  <text x="905" y="561" text-anchor="middle" font-size="11" font-weight="700" fill="#4ade80">A2A Advantages</text>
  <circle cx="680" cy="580" r="4" fill="#22c55e"/>
  <text x="694" y="584" font-size="11" fill="#94a3b8">Each agent is an independent HTTP service — deploy, version, scale on its own</text>
  <circle cx="680" cy="600" r="4" fill="#22c55e"/>
  <text x="694" y="604" font-size="11" fill="#94a3b8">Any language, any framework — Python, TS, Java — as long as it speaks A2A</text>
  <circle cx="680" cy="620" r="4" fill="#22c55e"/>
  <text x="694" y="624" font-size="11" fill="#94a3b8">New agents register into the pool — callers discover &amp; use them automatically</text>
  <circle cx="680" cy="640" r="4" fill="#22c55e"/>
  <text x="694" y="644" font-size="11" fill="#94a3b8">One agent fails — others keep running · no single-process crash</text>

  <!-- Team structure: multiple teams -->
  <rect x="660" y="672" width="490" height="48" rx="8" fill="#0d2a16" stroke="#374151" stroke-width="1"/>
  <text x="905" y="692" text-anchor="middle" font-size="11" font-weight="700" fill="#4ade80">Multiple Teams, Each Owning One Agent</text>
  <text x="905" y="710" text-anchor="middle" font-size="10" fill="#86efac">Tax Team  ·  Legal Team  ·  Compliance Team  ·  Platform Team (Registry)</text>

  <!-- Label at bottom -->
  <text x="905" y="744" text-anchor="middle" font-size="12" fill="#166534" font-style="italic">Agents are services, not functions.</text>
  <text x="905" y="764" text-anchor="middle" font-size="12" fill="#166534" font-style="italic">They live beyond any single workflow.</text>

  <!-- ============================================================ -->
  <!-- CENTER DIVIDER                                               -->
  <!-- ============================================================ -->
  <line x1="600" y1="100" x2="600" y2="780" stroke="#334155" stroke-width="1.5" stroke-dasharray="8,4"/>
  <circle cx="600" cy="440" r="32" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="600" y="434" text-anchor="middle" font-size="13" font-weight="800" fill="#64748b">VS</text>
  <text x="600" y="453" text-anchor="middle" font-size="9" fill="#475569">evolve</text>

  <!-- ============================================================ -->
  <!-- BOTTOM: 4 PHASE LIFECYCLE (A2A only)                        -->
  <!-- ============================================================ -->
  <rect x="25" y="800" width="1150" height="100" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="600" y="825" text-anchor="middle" font-size="14" font-weight="700" fill="#f1f5f9">A2A Agent Lifecycle in 4 Phases</text>

  <!-- Phase 1 -->
  <rect x="45" y="840" width="230" height="42" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="72" y="856" font-size="12" font-weight="700" fill="#60a5fa">1  Register</text>
  <text x="72" y="873" font-size="10" fill="#93c5fd">Agent starts → POST /register with capabilities</text>

  <!-- arrow -->
  <line x1="275" y1="861" x2="305" y2="861" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowW)"/>

  <!-- Phase 2 -->
  <rect x="305" y="840" width="230" height="42" rx="8" fill="#1a2e1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="332" y="856" font-size="12" font-weight="700" fill="#4ade80">2  Discover</text>
  <text x="332" y="873" font-size="10" fill="#86efac">Caller queries GET /discover/{"{task}"} at runtime</text>

  <!-- arrow -->
  <line x1="535" y1="861" x2="565" y2="861" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowW)"/>

  <!-- Phase 3 -->
  <rect x="565" y="840" width="230" height="42" rx="8" fill="#2a1e10" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="592" y="856" font-size="12" font-weight="700" fill="#fbbf24">3  Fetch Card</text>
  <text x="592" y="873" font-size="10" fill="#fde68a">GET /.well-known/agent.json → capabilities</text>

  <!-- arrow -->
  <line x1="795" y1="861" x2="825" y2="861" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowW)"/>

  <!-- Phase 4 -->
  <rect x="825" y="840" width="330" height="42" rx="8" fill="#2a1a3e" stroke="#a855f7" stroke-width="1.5"/>
  <text x="852" y="856" font-size="12" font-weight="700" fill="#c084fc">4  Delegate &amp; Reuse</text>
  <text x="852" y="873" font-size="10" fill="#d8b4fe">Send A2A message · receive Task artifact · compose</text>
</svg>