<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 920" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arrowB" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#3b82f6"/>
    </marker>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="920" fill="#0f172a"/>

  <!-- Title -->
  <rect x="0" y="0" width="1200" height="82" fill="url(#heroGrad)"/>
  <text x="600" y="38" text-anchor="middle" font-size="30" font-weight="700" fill="#f1f5f9">Why Multi-Agent AI Systems?</text>
  <text x="600" y="62" text-anchor="middle" font-size="15" fill="#94a3b8">From monolithic LLMs to specialized, collaborative agents — each expert in its own domain</text>
  <line x1="80" y1="82" x2="1120" y2="82" stroke="#334155" stroke-width="1"/>

  <!-- ===== LEFT: Single LLM ===== -->
  <rect x="40" y="100" width="520" height="400" rx="16" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="40" y="100" width="520" height="42" rx="16" fill="#2d1010"/>
  <rect x="40" y="128" width="520" height="14" fill="#2d1010"/>
  <text x="300" y="127" text-anchor="middle" font-size="17" font-weight="700" fill="#f87171">Traditional: Single LLM</text>

  <!-- Single monolith box -->
  <rect x="90" y="156" width="420" height="180" rx="12" fill="#0f172a" stroke="#7f1d1d" stroke-width="2"/>
  <text x="300" y="182" text-anchor="middle" font-size="15" font-weight="600" fill="#ef4444">One Large Language Model</text>
  <line x1="120" y1="192" x2="480" y2="192" stroke="#334155" stroke-width="0.5"/>
  <text x="300" y="212" text-anchor="middle" font-size="13" fill="#94a3b8">Handles: Contract Law</text>
  <text x="300" y="232" text-anchor="middle" font-size="13" fill="#94a3b8">Handles: Tax Law</text>
  <text x="300" y="252" text-anchor="middle" font-size="13" fill="#94a3b8">Handles: Compliance Regulations</text>
  <text x="300" y="272" text-anchor="middle" font-size="13" fill="#94a3b8">Handles: Customer Inquiries</text>
  <text x="300" y="292" text-anchor="middle" font-size="13" fill="#94a3b8">Handles: Everything else...</text>
  <text x="300" y="322" text-anchor="middle" font-size="13" fill="#64748b" font-style="italic">Jack of all trades, master of none</text>

  <!-- Problems -->
  <rect x="70" y="348" width="460" height="140" rx="10" fill="#0f172a" stroke="#7f1d1d" stroke-width="1"/>
  <text x="300" y="370" text-anchor="middle" font-size="13" font-weight="700" fill="#ef4444">Problems</text>
  <line x1="90" y1="378" x2="510" y2="378" stroke="#334155" stroke-width="0.5"/>

  <circle cx="92" cy="398" r="4" fill="#ef4444"/>
  <text x="106" y="402" font-size="12" fill="#fca5a5">Context overload</text>
  <text x="220" y="402" font-size="12" fill="#94a3b8"> — limited window for deep domain reasoning</text>

  <circle cx="92" cy="422" r="4" fill="#ef4444"/>
  <text x="106" y="426" font-size="12" fill="#fca5a5">No true specialization</text>
  <text x="252" y="426" font-size="12" fill="#94a3b8"> — shallow across all domains</text>

  <circle cx="92" cy="446" r="4" fill="#ef4444"/>
  <text x="106" y="450" font-size="12" fill="#fca5a5">Sequential only</text>
  <text x="210" y="450" font-size="12" fill="#94a3b8"> — cannot parallelize sub-tasks</text>

  <circle cx="92" cy="470" r="4" fill="#ef4444"/>
  <text x="106" y="474" font-size="12" fill="#fca5a5">Single point of failure</text>
  <text x="253" y="474" font-size="12" fill="#94a3b8"> — one model, one prompt, one crash</text>

  <!-- VS divider -->
  <circle cx="600" cy="300" r="30" fill="#1e293b" stroke="#475569" stroke-width="2.5"/>
  <text x="600" y="305" text-anchor="middle" font-size="18" font-weight="800" fill="#64748b">VS</text>

  <!-- ===== RIGHT: Multi-Agent ===== -->
  <rect x="640" y="100" width="520" height="400" rx="16" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="640" y="100" width="520" height="42" rx="16" fill="#052e16"/>
  <rect x="640" y="128" width="520" height="14" fill="#052e16"/>
  <text x="900" y="127" text-anchor="middle" font-size="17" font-weight="700" fill="#4ade80">Multi-Agent: Specialized Collaboration</text>

  <!-- Orchestrator -->
  <rect x="790" y="156" width="220" height="52" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="900" y="178" text-anchor="middle" font-size="14" font-weight="700" fill="#60a5fa">Orchestrator Agent</text>
  <text x="900" y="198" text-anchor="middle" font-size="11" fill="#93c5fd">Routes, coordinates, aggregates</text>

  <!-- Arrows down — spaced apart properly -->
  <line x1="830" y1="208" x2="750" y2="258" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <line x1="900" y1="208" x2="900" y2="258" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <line x1="970" y1="208" x2="1050" y2="258" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowB)"/>

  <!-- Specialist agents — NO OVERLAP: 660-810, 830-980, 1000-1150 -->
  <rect x="660" y="258" width="150" height="58" rx="8" fill="#1a2e1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="735" y="280" text-anchor="middle" font-size="13" font-weight="600" fill="#4ade80">Law Agent</text>
  <text x="735" y="298" text-anchor="middle" font-size="11" fill="#86efac">Contract specialist</text>

  <rect x="825" y="258" width="150" height="58" rx="8" fill="#2a1a3e" stroke="#a855f7" stroke-width="1.5"/>
  <text x="900" y="280" text-anchor="middle" font-size="13" font-weight="600" fill="#c084fc">Tax Agent</text>
  <text x="900" y="298" text-anchor="middle" font-size="11" fill="#d8b4fe">IRS &amp; tax law expert</text>

  <rect x="990" y="258" width="160" height="58" rx="8" fill="#2a1e10" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="1070" y="280" text-anchor="middle" font-size="13" font-weight="600" fill="#fbbf24">Compliance</text>
  <text x="1070" y="298" text-anchor="middle" font-size="11" fill="#fde68a">SEC, SOX, GDPR</text>

  <!-- Benefits -->
  <rect x="670" y="332" width="460" height="156" rx="10" fill="#0f172a" stroke="#166534" stroke-width="1"/>
  <text x="900" y="354" text-anchor="middle" font-size="13" font-weight="700" fill="#4ade80">Benefits</text>
  <line x1="690" y1="362" x2="1110" y2="362" stroke="#334155" stroke-width="0.5"/>

  <circle cx="692" cy="382" r="4" fill="#22c55e"/>
  <text x="706" y="386" font-size="12" fill="#86efac">Deep expertise</text>
  <text x="806" y="386" font-size="12" fill="#94a3b8"> — each agent masters one domain</text>

  <circle cx="692" cy="406" r="4" fill="#22c55e"/>
  <text x="706" y="410" font-size="12" fill="#86efac">Parallel execution</text>
  <text x="832" y="410" font-size="12" fill="#94a3b8"> — Tax + Compliance simultaneously</text>

  <circle cx="692" cy="430" r="4" fill="#22c55e"/>
  <text x="706" y="434" font-size="12" fill="#86efac">Scalable</text>
  <text x="762" y="434" font-size="12" fill="#94a3b8"> — add new specialists without rewriting</text>

  <circle cx="692" cy="454" r="4" fill="#22c55e"/>
  <text x="706" y="458" font-size="12" fill="#86efac">Independent deployment</text>
  <text x="872" y="458" font-size="12" fill="#94a3b8"> — version and scale each service</text>

  <circle cx="692" cy="478" r="4" fill="#22c55e"/>
  <text x="706" y="482" font-size="12" fill="#86efac">Fault isolation</text>
  <text x="800" y="482" font-size="12" fill="#94a3b8"> — one agent fails, others keep running</text>

  <!-- ===== Bottom: Three Pillars ===== -->
  <text x="600" y="536" text-anchor="middle" font-size="18" font-weight="700" fill="#e2e8f0">Core Principles of Multi-Agent Design</text>
  <line x1="120" y1="548" x2="1080" y2="548" stroke="#334155" stroke-width="1"/>

  <!-- Pillar 1: Separation of Concerns -->
  <rect x="40" y="562" width="360" height="150" rx="14" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <rect x="40" y="562" width="360" height="36" rx="14" fill="#1e3a5f"/>
  <rect x="40" y="584" width="360" height="14" fill="#1e3a5f"/>
  <text x="220" y="586" text-anchor="middle" font-size="14" font-weight="700" fill="#60a5fa">Separation of Concerns</text>

  <text x="64" y="616" font-size="12" fill="#cbd5e1">Each agent owns exactly one domain.</text>
  <text x="64" y="636" font-size="12" fill="#94a3b8">Prompts, context, tools, and system messages</text>
  <text x="64" y="656" font-size="12" fill="#94a3b8">are tailored to that specialty only.</text>
  <text x="64" y="680" font-size="11" fill="#475569">Tax Agent only knows tax law. Law Agent</text>
  <text x="64" y="696" font-size="11" fill="#475569">handles contracts. No context pollution.</text>

  <!-- Pillar 2: Dynamic Orchestration -->
  <rect x="420" y="562" width="360" height="150" rx="14" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
  <rect x="420" y="562" width="360" height="36" rx="14" fill="#2a1a3e"/>
  <rect x="420" y="584" width="360" height="14" fill="#2a1a3e"/>
  <text x="600" y="586" text-anchor="middle" font-size="14" font-weight="700" fill="#c084fc">Dynamic Orchestration</text>

  <text x="444" y="616" font-size="12" fill="#cbd5e1">A coordinator decides at runtime which</text>
  <text x="444" y="636" font-size="12" fill="#94a3b8">specialists to call, in what order, and</text>
  <text x="444" y="656" font-size="12" fill="#94a3b8">how to merge their answers into one response.</text>
  <text x="444" y="680" font-size="11" fill="#475569">LLM-driven routing: "needs_tax? needs_compliance?"</text>
  <text x="444" y="696" font-size="11" fill="#475569">Parallel via LangGraph Send API.</text>

  <!-- Pillar 3: Standardized Communication -->
  <rect x="800" y="562" width="360" height="150" rx="14" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <rect x="800" y="562" width="360" height="36" rx="14" fill="#052e16"/>
  <rect x="800" y="584" width="360" height="14" fill="#052e16"/>
  <text x="980" y="586" text-anchor="middle" font-size="14" font-weight="700" fill="#4ade80">Standardized Communication</text>

  <text x="824" y="616" font-size="12" fill="#cbd5e1">Agents talk via a common protocol</text>
  <text x="824" y="636" font-size="12" fill="#94a3b8">(A2A) — language, model, and framework</text>
  <text x="824" y="656" font-size="12" fill="#94a3b8">agnostic. Any agent can call any other.</text>
  <text x="824" y="680" font-size="11" fill="#475569">AgentCard for discovery, Tasks for lifecycle,</text>
  <text x="824" y="696" font-size="11" fill="#475569">Messages with Parts for content exchange.</text>

  <!-- Bottom tagline -->
  <rect x="200" y="740" width="800" height="50" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="600" y="762" text-anchor="middle" font-size="14" fill="#e2e8f0">This project: A </text>
  <text x="668" y="762" font-size="14" font-weight="700" fill="#60a5fa">Legal AI system</text>
  <text x="780" y="762" font-size="14" fill="#e2e8f0"> built on Google's </text>
  <text x="908" y="762" font-size="14" font-weight="700" fill="#4ade80">A2A protocol</text>
  <text x="992" y="762" font-size="14" fill="#e2e8f0"> + </text>
  <text x="1008" y="762" font-size="14" font-weight="700" fill="#c084fc">LangGraph</text>
  <text x="600" y="782" text-anchor="middle" font-size="12" fill="#475569">4 specialized agents (Customer, Law, Tax, Compliance) + Registry service, communicating via HTTP/JSON-RPC</text>
</svg>