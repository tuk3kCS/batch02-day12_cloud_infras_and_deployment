<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 840" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowW" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowP" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a855f7"/>
    </marker>
    <marker id="arrowA" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="840" fill="#0f172a"/>

  <!-- Title -->
  <rect x="0" y="0" width="1200" height="82" fill="url(#heroGrad)"/>
  <text x="600" y="38" text-anchor="middle" font-size="28" font-weight="700" fill="#f1f5f9">Law Agent — LangGraph StateGraph Deep Dive</text>
  <text x="600" y="62" text-anchor="middle" font-size="15" fill="#94a3b8">Parallel delegation via Send API · State merging with reducers · Depth-guarded recursion</text>
  <line x1="80" y1="82" x2="1120" y2="82" stroke="#334155" stroke-width="1"/>

  <!-- ===== LEFT: Graph Flow ===== -->
  <!-- START -->
  <circle cx="250" cy="135" r="20" fill="#22c55e" stroke="#166534" stroke-width="2"/>
  <text x="250" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">START</text>
  <line x1="250" y1="155" x2="250" y2="195" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Node 1: analyze_law -->
  <rect x="130" y="195" width="240" height="80" rx="12" fill="#1a2e1a" stroke="#22c55e" stroke-width="2"/>
  <text x="250" y="220" text-anchor="middle" font-size="13" font-weight="700" fill="#4ade80">analyze_law</text>
  <text x="250" y="240" text-anchor="middle" font-size="11" fill="#86efac">LLM provides contract &amp; general</text>
  <text x="250" y="258" text-anchor="middle" font-size="11" fill="#86efac">law analysis perspective</text>
  <line x1="250" y1="275" x2="250" y2="315" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Node 2: check_routing -->
  <rect x="130" y="315" width="240" height="80" rx="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="250" y="340" text-anchor="middle" font-size="13" font-weight="700" fill="#60a5fa">check_routing</text>
  <text x="250" y="360" text-anchor="middle" font-size="11" fill="#93c5fd">LLM decides: needs_tax? and</text>
  <text x="250" y="378" text-anchor="middle" font-size="11" fill="#93c5fd">needs_compliance? (JSON output)</text>
  <line x1="250" y1="395" x2="250" y2="435" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowW)"/>

  <!-- Node 3: route_to_subagents (diamond) -->
  <polygon points="250,435 330,480 250,525 170,480" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="250" y="476" text-anchor="middle" font-size="11" font-weight="700" fill="#fbbf24">route_to</text>
  <text x="250" y="492" text-anchor="middle" font-size="11" font-weight="700" fill="#fbbf24">_subagents</text>
  <text x="250" y="508" text-anchor="middle" font-size="9" fill="#fde68a">Returns list[Send]</text>

  <!-- Route to Tax (left diagonal) -->
  <line x1="170" y1="480" x2="90" y2="558" stroke="#a855f7" stroke-width="2" marker-end="url(#arrowP)"/>
  <text x="100" y="525" font-size="10" fill="#a855f7">Send("call_tax")</text>

  <!-- Route to Compliance (right diagonal) -->
  <line x1="330" y1="480" x2="410" y2="558" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowA)"/>
  <text x="338" y="525" font-size="10" fill="#f59e0b">Send("call_compliance")</text>

  <!-- Route: neither → aggregate direct -->
  <path d="M 250 525 L 250 600" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowW)"/>
  <text x="258" y="568" font-size="9" fill="#64748b">neither needed</text>

  <!-- Node: call_tax -->
  <rect x="20" y="558" width="140" height="72" rx="10" fill="#2a1a3e" stroke="#a855f7" stroke-width="2"/>
  <text x="90" y="580" text-anchor="middle" font-size="12" font-weight="700" fill="#c084fc">call_tax</text>
  <text x="90" y="598" text-anchor="middle" font-size="10" fill="#d8b4fe">A2A delegate →</text>
  <text x="90" y="614" text-anchor="middle" font-size="10" fill="#d8b4fe">Tax Agent (10102)</text>

  <!-- Node: call_compliance -->
  <rect x="340" y="558" width="160" height="72" rx="10" fill="#2a1e10" stroke="#f59e0b" stroke-width="2"/>
  <text x="420" y="580" text-anchor="middle" font-size="12" font-weight="700" fill="#fbbf24">call_compliance</text>
  <text x="420" y="598" text-anchor="middle" font-size="10" fill="#fde68a">A2A delegate →</text>
  <text x="420" y="614" text-anchor="middle" font-size="10" fill="#fde68a">Compliance Agent (10103)</text>

  <!-- Both → aggregate -->
  <line x1="90" y1="630" x2="200" y2="660" stroke="#a855f7" stroke-width="2" marker-end="url(#arrowW)"/>
  <line x1="420" y1="630" x2="300" y2="660" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowW)"/>

  <!-- Node: aggregate -->
  <rect x="130" y="660" width="240" height="80" rx="12" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
  <text x="250" y="685" text-anchor="middle" font-size="13" font-weight="700" fill="#60a5fa">aggregate</text>
  <text x="250" y="705" text-anchor="middle" font-size="11" fill="#93c5fd">LLM synthesizes: law_analysis +</text>
  <text x="250" y="723" text-anchor="middle" font-size="11" fill="#93c5fd">tax_result + compliance_result</text>

  <line x1="250" y1="740" x2="250" y2="770" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- END -->
  <rect x="210" y="770" width="80" height="30" rx="15" fill="#22c55e" stroke="#166534" stroke-width="2"/>
  <text x="250" y="790" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">END</text>

  <!-- ===== RIGHT PANEL: State & Code ===== -->
  <!-- State definition -->
  <rect x="560" y="105" width="590" height="200" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="855" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#f1f5f9">LawState — TypedDict with Reducers</text>
  <rect x="580" y="142" width="550" height="148" rx="8" fill="#0f172a" stroke="#374151" stroke-width="1"/>
  <text x="600" y="164" font-size="11" fill="#c084fc">class</text><text x="632" y="164" font-size="11" fill="#fbbf24"> LawState</text><text x="686" y="164" font-size="11" fill="#94a3b8">(TypedDict):</text>
  <text x="615" y="184" font-size="11" fill="#94a3b8">  question:          </text><text x="726" y="184" font-size="11" fill="#60a5fa">str</text>
  <text x="615" y="202" font-size="11" fill="#94a3b8">  law_analysis:      </text><text x="726" y="202" font-size="11" fill="#60a5fa">str</text>
  <text x="615" y="220" font-size="11" fill="#94a3b8">  needs_tax:         </text><text x="726" y="220" font-size="11" fill="#60a5fa">bool</text>
  <text x="615" y="238" font-size="11" fill="#94a3b8">  needs_compliance:  </text><text x="726" y="238" font-size="11" fill="#60a5fa">bool</text>
  <text x="615" y="256" font-size="11" fill="#94a3b8">  tax_result:        </text><text x="726" y="256" font-size="11" fill="#4ade80">Annotated[str, _last_wins]</text>
  <text x="615" y="274" font-size="11" fill="#94a3b8">  compliance_result: </text><text x="726" y="274" font-size="11" fill="#4ade80">Annotated[str, _last_wins]</text>
  <text x="600" y="282" font-size="9" fill="#64748b">                              # reducer: parallel branches write safely</text>

  <!-- Send API -->
  <rect x="560" y="320" width="590" height="170" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="855" y="345" text-anchor="middle" font-size="14" font-weight="700" fill="#f1f5f9">LangGraph Send API — Parallel Branches</text>
  <rect x="580" y="357" width="550" height="118" rx="8" fill="#0f172a" stroke="#374151" stroke-width="1"/>
  <text x="600" y="377" font-size="11" fill="#c084fc">def</text><text x="622" y="377" font-size="11" fill="#fbbf24"> route_to_subagents</text><text x="734" y="377" font-size="11" fill="#94a3b8">(state: LawState) → </text><text x="851" y="377" font-size="11" fill="#60a5fa">list</text><text x="869" y="377" font-size="11" fill="#94a3b8">:</text>
  <text x="615" y="395" font-size="11" fill="#94a3b8">  targets = []</text>
  <text x="615" y="413" font-size="11" fill="#f59e0b">  if</text><text x="634" y="413" font-size="11" fill="#94a3b8"> state[</text><text x="668" y="413" font-size="11" fill="#86efac">"needs_tax"</text><text x="724" y="413" font-size="11" fill="#94a3b8">]: targets.append(</text><text x="829" y="413" font-size="11" fill="#4ade80">Send(</text><text x="856" y="413" font-size="11" fill="#fde68a">"call_tax"</text><text x="905" y="413" font-size="11" fill="#4ade80">, state)</text><text x="940" y="413" font-size="11" fill="#94a3b8">)</text>
  <text x="615" y="431" font-size="11" fill="#f59e0b">  if</text><text x="634" y="431" font-size="11" fill="#94a3b8"> state[</text><text x="668" y="431" font-size="11" fill="#86efac">"needs_compliance"</text><text x="772" y="431" font-size="11" fill="#94a3b8">]: targets.append(</text><text x="877" y="431" font-size="11" fill="#4ade80">Send(</text><text x="904" y="431" font-size="11" fill="#fde68a">"call_compliance"</text><text x="994" y="431" font-size="11" fill="#4ade80">, state)</text><text x="1030" y="431" font-size="11" fill="#94a3b8">)</text>
  <text x="615" y="449" font-size="11" fill="#f59e0b">  return</text><text x="654" y="449" font-size="11" fill="#94a3b8"> targets </text><text x="697" y="449" font-size="11" fill="#f59e0b">if</text><text x="716" y="449" font-size="11" fill="#94a3b8"> targets </text><text x="759" y="449" font-size="11" fill="#f59e0b">else</text><text x="783" y="449" font-size="11" fill="#4ade80"> [Send(</text><text x="820" y="449" font-size="11" fill="#fde68a">"aggregate"</text><text x="884" y="449" font-size="11" fill="#4ade80">, state)]</text>
  <text x="600" y="462" font-size="9" fill="#64748b">  # Both branches run concurrently — true parallelism inside LangGraph</text>

  <!-- Depth Guard -->
  <rect x="560" y="506" width="590" height="145" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="855" y="531" text-anchor="middle" font-size="14" font-weight="700" fill="#f1f5f9">Delegation Depth Guard</text>
  <rect x="580" y="543" width="550" height="93" rx="8" fill="#0f172a" stroke="#374151" stroke-width="1"/>
  <text x="600" y="563" font-size="11" fill="#64748b">  # Extracted from A2A message metadata at executor entry</text>
  <text x="600" y="581" font-size="11" fill="#94a3b8">  depth = context.metadata.get(</text><text x="767" y="581" font-size="11" fill="#86efac">"delegation_depth"</text><text x="874" y="581" font-size="11" fill="#94a3b8">, </text><text x="882" y="581" font-size="11" fill="#f87171">0</text><text x="889" y="581" font-size="11" fill="#94a3b8">)</text>
  <text x="600" y="599" font-size="11" fill="#f59e0b">  if</text><text x="619" y="599" font-size="11" fill="#94a3b8"> depth >= </text><text x="663" y="599" font-size="11" fill="#f87171">MAX_DELEGATION_DEPTH</text><text x="793" y="599" font-size="11" fill="#94a3b8">:  </text><text x="810" y="599" font-size="11" fill="#64748b"># = 3</text>
  <text x="615" y="617" font-size="11" fill="#94a3b8">    state[</text><text x="651" y="617" font-size="11" fill="#86efac">"needs_tax"</text><text x="707" y="617" font-size="11" fill="#94a3b8">] = </text><text x="726" y="617" font-size="11" fill="#f87171">False</text><text x="754" y="617" font-size="11" fill="#94a3b8">; state[</text><text x="793" y="617" font-size="11" fill="#86efac">"needs_compliance"</text><text x="899" y="617" font-size="11" fill="#94a3b8">] = </text><text x="918" y="617" font-size="11" fill="#f87171">False</text>
  <text x="600" y="628" font-size="9" fill="#64748b">      # Forces local-only answer — prevents infinite delegation loops</text>

  <!-- Parallelism callout -->
  <rect x="560" y="666" width="590" height="100" rx="14" fill="#1a2e1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="855" y="691" text-anchor="middle" font-size="13" font-weight="700" fill="#4ade80">Why LangGraph Send API over asyncio.gather?</text>
  <circle cx="583" cy="713" r="4" fill="#22c55e"/>
  <text x="596" y="717" font-size="12" fill="#94a3b8">Proper LangGraph state management — reducers handle concurrent writes automatically</text>
  <circle cx="583" cy="733" r="4" fill="#22c55e"/>
  <text x="596" y="737" font-size="12" fill="#94a3b8">Nodes are first-class graph nodes — visible in traces, debuggable in LangSmith</text>
  <circle cx="583" cy="753" r="4" fill="#22c55e"/>
  <text x="596" y="757" font-size="12" fill="#94a3b8">Framework handles scheduling — cleaner than manual async task management</text>
</svg>