<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arrowW" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowA" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="820" fill="#0f172a"/>

  <!-- Title -->
  <rect x="0" y="0" width="1200" height="82" fill="url(#heroGrad)"/>
  <text x="600" y="38" text-anchor="middle" font-size="28" font-weight="700" fill="#f1f5f9">A2A Protocol — In This Project</text>
  <text x="600" y="62" text-anchor="middle" font-size="15" fill="#94a3b8">How our Legal Multi-Agent system uses A2A — AgentCard, Task lifecycle, Message structure, and flow</text>
  <line x1="80" y1="82" x2="1120" y2="82" stroke="#334155" stroke-width="1"/>

  <!-- ===== SECTION 1: What is A2A ===== -->
  <rect x="60" y="108" width="500" height="210" rx="14" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="60" y="108" width="500" height="38" rx="14" fill="#1e3a5f"/>
  <rect x="60" y="132" width="500" height="14" fill="#1e3a5f"/>
  <text x="310" y="133" text-anchor="middle" font-size="15" font-weight="700" fill="#60a5fa">What is A2A?</text>

  <text x="90" y="168" font-size="13" fill="#cbd5e1">A2A is an open protocol for AI agents to:</text>
  <circle cx="95" cy="190" r="4" fill="#3b82f6"/>
  <text x="110" y="194" font-size="13" fill="#94a3b8">Advertise their capabilities via an </text>
  <text x="308" y="194" font-size="13" font-weight="600" fill="#60a5fa">   AgentCard</text>
  <circle cx="95" cy="213" r="4" fill="#3b82f6"/>
  <text x="110" y="217" font-size="13" fill="#94a3b8">Send and receive structured </text>
  <text x="278" y="217" font-size="13" font-weight="600" fill="#60a5fa">Messages</text>
  <circle cx="95" cy="236" r="4" fill="#3b82f6"/>
  <text x="110" y="240" font-size="13" fill="#94a3b8">Track long-running work as </text>
  <text x="268" y="240" font-size="13" font-weight="600" fill="#60a5fa">Tasks</text>
  <circle cx="95" cy="259" r="4" fill="#3b82f6"/>
  <text x="110" y="263" font-size="13" fill="#94a3b8">Stream partial results via </text>
  <text x="253" y="263" font-size="13" font-weight="600" fill="#60a5fa">EventQueue</text>
  <circle cx="95" cy="282" r="4" fill="#3b82f6"/>
  <text x="110" y="286" font-size="13" fill="#94a3b8">Remain model &amp; framework neutral — any LLM, any stack</text>

  <!-- ===== SECTION 2: Agent Card ===== -->
  <rect x="640" y="108" width="500" height="210" rx="14" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <rect x="640" y="108" width="500" height="38" rx="14" fill="#2a1a3e"/>
  <rect x="640" y="132" width="500" height="14" fill="#2a1a3e"/>
  <text x="890" y="133" text-anchor="middle" font-size="15" font-weight="700" fill="#c084fc">AgentCard — The Agent's Identity</text>

  <text x="660" y="165" font-size="12" fill="#6b7280">GET /.well-known/agent.json</text>
  <rect x="660" y="175" width="460" height="128" rx="8" fill="#0f172a" stroke="#374151" stroke-width="1"/>
  <text x="680" y="198" font-size="11" fill="#6b7280">&#123;</text>
  <text x="695" y="216" font-size="11" fill="#94a3b8">  "name": </text><text x="748" y="216" font-size="11" fill="#86efac">"law-agent"</text><text x="815" y="216" font-size="11" fill="#94a3b8">,</text>
  <text x="695" y="233" font-size="11" fill="#94a3b8">  "version": </text><text x="757" y="233" font-size="11" fill="#86efac">"1.0"</text><text x="785" y="233" font-size="11" fill="#94a3b8">,</text>
  <text x="695" y="250" font-size="11" fill="#94a3b8">  "url": </text><text x="733" y="250" font-size="11" fill="#fde68a">"http://localhost:10101"</text><text x="882" y="250" font-size="11" fill="#94a3b8">,</text>
  <text x="695" y="267" font-size="11" fill="#94a3b8">  "skills": [</text><text x="757" y="267" font-size="11" fill="#86efac">"legal_question"</text><text x="852" y="267" font-size="11" fill="#94a3b8">],</text>
  <text x="695" y="284" font-size="11" fill="#94a3b8">  "capabilities": &#123; </text><text x="780" y="284" font-size="11" fill="#c084fc">"streaming": false</text><text x="893" y="284" font-size="11" fill="#94a3b8"> &#125;</text>
  <text x="680" y="297" font-size="11" fill="#6b7280">&#125;</text>

  <!-- ===== SECTION 3: Task Lifecycle ===== -->
  <rect x="60" y="335" width="500" height="230" rx="14" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="60" y="335" width="500" height="38" rx="14" fill="#1a2e1a"/>
  <rect x="60" y="359" width="500" height="14" fill="#1a2e1a"/>
  <text x="310" y="360" text-anchor="middle" font-size="15" font-weight="700" fill="#4ade80">Task Lifecycle</text>

  <!-- States -->
  <rect x="90" y="378" width="100" height="36" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="401" text-anchor="middle" font-size="12" font-weight="600" fill="#60a5fa">submitted</text>

  <line x1="190" y1="396" x2="220" y2="396" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowW)"/>

  <rect x="220" y="378" width="100" height="36" rx="8" fill="#2a1e10" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="270" y="401" text-anchor="middle" font-size="12" font-weight="600" fill="#fbbf24">working</text>

  <line x1="320" y1="396" x2="350" y2="396" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowW)"/>

  <rect x="350" y="378" width="100" height="36" rx="8" fill="#1a2e1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="400" y="401" text-anchor="middle" font-size="12" font-weight="600" fill="#4ade80">completed</text>

  <!-- Artifact -->
  <rect x="170" y="440" width="220" height="36" rx="8" fill="#2a1a3e" stroke="#a855f7" stroke-width="1.5"/>
  <text x="280" y="463" text-anchor="middle" font-size="12" fill="#c084fc">add_artifact(TextPart)</text>
  <line x1="270" y1="414" x2="270" y2="440" stroke="#a855f7" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- TaskUpdater code -->
  <rect x="90" y="495" width="440" height="60" rx="8" fill="#0f172a" stroke="#374151" stroke-width="1"/>
  <text x="310" y="514" text-anchor="middle" font-size="11" fill="#6b7280"># TaskUpdater pattern (Python)</text>
  <text x="108" y="533" font-size="11" fill="#60a5fa">updater</text><text x="147" y="533" font-size="11" fill="#94a3b8">.submit() → .start_work() → .add_artifact(</text><text x="407" y="533" font-size="11" fill="#86efac">answer</text><text x="436" y="533" font-size="11" fill="#94a3b8">) → .complete()</text>

  <!-- ===== SECTION 4: Message Structure ===== -->
  <rect x="640" y="335" width="500" height="230" rx="14" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="640" y="335" width="500" height="38" rx="14" fill="#2a1e10"/>
  <rect x="640" y="359" width="500" height="14" fill="#2a1e10"/>
  <text x="890" y="360" text-anchor="middle" font-size="15" font-weight="700" fill="#fbbf24">Message Structure</text>

  <rect x="660" y="378" width="460" height="172" rx="8" fill="#0f172a" stroke="#374151" stroke-width="1"/>
  <text x="680" y="400" font-size="11" fill="#6b7280">&#123;</text>
  <text x="695" y="418" font-size="11" fill="#94a3b8">  role: </text><text x="730" y="418" font-size="11" fill="#86efac">"user"</text><text x="760" y="418" font-size="11" fill="#94a3b8">,</text>
  <text x="695" y="436" font-size="11" fill="#94a3b8">  message_id: </text><text x="761" y="436" font-size="11" fill="#86efac">"550e8400-e29b-41d4..."</text><text x="918" y="436" font-size="11" fill="#94a3b8">,</text>
  <text x="695" y="454" font-size="11" fill="#94a3b8">  context_id: </text><text x="757" y="454" font-size="11" fill="#fde68a">"ctx-abc123"</text><text x="835" y="454" font-size="11" fill="#94a3b8">,</text>
  <text x="695" y="472" font-size="11" fill="#94a3b8">  parts: [ &#123; </text><text x="756" y="472" font-size="11" fill="#c084fc">TextPart</text><text x="803" y="472" font-size="11" fill="#94a3b8">: </text><text x="813" y="472" font-size="11" fill="#86efac">"Is tax evasion a crime?"</text><text x="965" y="472" font-size="11" fill="#94a3b8"> &#125; ],</text>
  <text x="695" y="490" font-size="11" fill="#94a3b8">  metadata: &#123;</text>
  <text x="715" y="507" font-size="11" fill="#fbbf24">    trace_id: </text><text x="775" y="507" font-size="11" fill="#fde68a">"trace-xyz"</text><text x="833" y="507" font-size="11" fill="#94a3b8">, </text><text x="843" y="507" font-size="11" fill="#fbbf24">delegation_depth: </text><text x="960" y="507" font-size="11" fill="#f87171">1</text>
  <text x="695" y="524" font-size="11" fill="#94a3b8">  &#125;</text>
  <text x="680" y="542" font-size="11" fill="#6b7280">&#125;</text>

  <!-- ===== SECTION 5: Full Communication Flow ===== -->
  <rect x="60" y="580" width="1080" height="215" rx="14" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="600" y="607" text-anchor="middle" font-size="15" font-weight="700" fill="#f1f5f9">A2A Communication Flow in This Project</text>

  <!-- Step boxes -->
  <!-- Step 1 -->
  <rect x="90" y="622" width="148" height="64" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="164" y="643" text-anchor="middle" font-size="11" font-weight="700" fill="#60a5fa">1. Discover</text>
  <text x="164" y="661" text-anchor="middle" font-size="10" fill="#93c5fd">GET /discover/</text>
  <text x="164" y="677" text-anchor="middle" font-size="10" fill="#93c5fd">legal_question</text>

  <line x1="238" y1="654" x2="268" y2="654" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowW)"/>

  <!-- Step 2 -->
  <rect x="268" y="622" width="148" height="64" rx="8" fill="#2a1e10" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="342" y="643" text-anchor="middle" font-size="11" font-weight="700" fill="#fbbf24">2. Fetch Card</text>
  <text x="342" y="661" text-anchor="middle" font-size="10" fill="#fde68a">GET /.well-known/</text>
  <text x="342" y="677" text-anchor="middle" font-size="10" fill="#fde68a">agent.json</text>

  <line x1="416" y1="654" x2="446" y2="654" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowW)"/>

  <!-- Step 3 -->
  <rect x="446" y="622" width="148" height="64" rx="8" fill="#1a2e1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="520" y="643" text-anchor="middle" font-size="11" font-weight="700" fill="#4ade80">3. Send Message</text>
  <text x="520" y="661" text-anchor="middle" font-size="10" fill="#86efac">POST /</text>
  <text x="520" y="677" text-anchor="middle" font-size="10" fill="#86efac">with Message payload</text>

  <line x1="594" y1="654" x2="624" y2="654" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowW)"/>

  <!-- Step 4 -->
  <rect x="624" y="622" width="148" height="64" rx="8" fill="#2a1a3e" stroke="#a855f7" stroke-width="1.5"/>
  <text x="698" y="643" text-anchor="middle" font-size="11" font-weight="700" fill="#c084fc">4. Execute Task</text>
  <text x="698" y="661" text-anchor="middle" font-size="10" fill="#d8b4fe">AgentExecutor</text>
  <text x="698" y="677" text-anchor="middle" font-size="10" fill="#d8b4fe">runs LangGraph</text>

  <line x1="772" y1="654" x2="802" y2="654" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowW)"/>

  <!-- Step 5 -->
  <rect x="802" y="622" width="148" height="64" rx="8" fill="#1a2e1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="876" y="643" text-anchor="middle" font-size="11" font-weight="700" fill="#4ade80">5. Return Result</text>
  <text x="876" y="661" text-anchor="middle" font-size="10" fill="#86efac">Task artifacts</text>
  <text x="876" y="677" text-anchor="middle" font-size="10" fill="#86efac">with TextPart answer</text>

  <!-- Annotation row -->
  <text x="164" y="720" text-anchor="middle" font-size="10" fill="#64748b">Registry lookup</text>
  <text x="342" y="720" text-anchor="middle" font-size="10" fill="#64748b">Capabilities check</text>
  <text x="520" y="720" text-anchor="middle" font-size="10" fill="#64748b">A2AClient.send_message()</text>
  <text x="698" y="720" text-anchor="middle" font-size="10" fill="#64748b">LangGraph + LLM</text>
  <text x="876" y="720" text-anchor="middle" font-size="10" fill="#64748b">JSON response</text>

  <!-- Key insight box -->
  <rect x="970" y="622" width="148" height="64" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="1044" y="643" text-anchor="middle" font-size="10" fill="#64748b">Any agent can call</text>
  <text x="1044" y="661" text-anchor="middle" font-size="10" fill="#64748b">any other agent —</text>
  <text x="1044" y="679" text-anchor="middle" font-size="10" fill="#64748b">same protocol always</text>
  <line x1="950" y1="654" x2="970" y2="654" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
</svg>