<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 860" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arrowW" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4ade80"/>
    </marker>
    <marker id="arrowP" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c084fc"/>
    </marker>
    <marker id="arrowA" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fbbf24"/>
    </marker>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="860" fill="#0f172a"/>

  <!-- Title -->
  <rect x="0" y="0" width="1200" height="82" fill="url(#heroGrad)"/>
  <text x="600" y="38" text-anchor="middle" font-size="28" font-weight="700" fill="#f1f5f9">End-to-End Request Flow with Trace Propagation</text>
  <text x="600" y="62" text-anchor="middle" font-size="14" fill="#94a3b8">Query: "If a company breaks a contract and evades taxes, what are the consequences?"</text>
  <line x1="80" y1="82" x2="1120" y2="82" stroke="#334155" stroke-width="1"/>

  <!-- ===== SWIMLANE HEADERS ===== -->
  <!-- User -->
  <rect x="30" y="100" width="130" height="44" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
  <text x="95" y="127" text-anchor="middle" font-size="13" font-weight="700" fill="#94a3b8">User Client</text>

  <!-- Customer -->
  <rect x="195" y="100" width="160" height="44" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="275" y="127" text-anchor="middle" font-size="13" font-weight="700" fill="#60a5fa">Customer Agent</text>
  <text x="275" y="140" text-anchor="middle" font-size="10" fill="#93c5fd">:10100</text>

  <!-- Registry -->
  <rect x="390" y="100" width="130" height="44" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
  <text x="455" y="127" text-anchor="middle" font-size="13" font-weight="700" fill="#94a3b8">Registry</text>
  <text x="455" y="140" text-anchor="middle" font-size="10" fill="#64748b">:10000</text>

  <!-- Law -->
  <rect x="555" y="100" width="150" height="44" rx="8" fill="#1a2e1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="630" y="127" text-anchor="middle" font-size="13" font-weight="700" fill="#4ade80">Law Agent</text>
  <text x="630" y="140" text-anchor="middle" font-size="10" fill="#86efac">:10101</text>

  <!-- Tax -->
  <rect x="740" y="100" width="140" height="44" rx="8" fill="#2a1a3e" stroke="#a855f7" stroke-width="1.5"/>
  <text x="810" y="127" text-anchor="middle" font-size="13" font-weight="700" fill="#c084fc">Tax Agent</text>
  <text x="810" y="140" text-anchor="middle" font-size="10" fill="#d8b4fe">:10102</text>

  <!-- Compliance -->
  <rect x="920" y="100" width="140" height="44" rx="8" fill="#2a1e10" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="990" y="127" text-anchor="middle" font-size="13" font-weight="700" fill="#fbbf24">Compliance</text>
  <text x="990" y="140" text-anchor="middle" font-size="10" fill="#fde68a">:10103</text>

  <!-- LLM -->
  <rect x="1095" y="100" width="80" height="44" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="1135" y="119" text-anchor="middle" font-size="11" font-weight="700" fill="#64748b">Open</text>
  <text x="1135" y="136" text-anchor="middle" font-size="11" font-weight="700" fill="#64748b">Router</text>

  <!-- Swimlane vertical lines -->
  <line x1="95" y1="148" x2="95" y2="790" stroke="#1e293b" stroke-width="1"/>
  <line x1="275" y1="148" x2="275" y2="790" stroke="#1e293b" stroke-width="1"/>
  <line x1="455" y1="148" x2="455" y2="790" stroke="#1e293b" stroke-width="1"/>
  <line x1="630" y1="148" x2="630" y2="790" stroke="#1e293b" stroke-width="1"/>
  <line x1="810" y1="148" x2="810" y2="790" stroke="#1e293b" stroke-width="1"/>
  <line x1="990" y1="148" x2="990" y2="790" stroke="#1e293b" stroke-width="1"/>
  <line x1="1135" y1="148" x2="1135" y2="790" stroke="#1e293b" stroke-width="1"/>

  <!-- Trace ID badge -->
  <rect x="30" y="156" width="340" height="24" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="200" y="173" text-anchor="middle" font-size="11" fill="#fbbf24">trace_id: "abc-123..." generated at Customer Agent · propagated to all hops</text>

  <!-- ===== STEP 1 ===== -->
  <text x="30" y="207" font-size="11" font-weight="700" fill="#64748b">① Send question</text>
  <line x1="95" y1="200" x2="265" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowW)"/>
  <rect x="100" y="188" width="160" height="24" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="180" y="204" text-anchor="middle" font-size="10" fill="#94a3b8">A2A Message (plain text)</text>

  <!-- ===== STEP 2 ===== -->
  <text x="30" y="247" font-size="11" font-weight="700" fill="#64748b">② LLM: detect domain</text>
  <line x1="275" y1="240" x2="1125" y2="240" stroke="#334155" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowW)"/>
  <line x1="1125" y1="255" x2="275" y2="255" stroke="#60a5fa" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowB)"/>
  <text x="700" y="237" text-anchor="middle" font-size="10" fill="#64748b">→ chat request</text>
  <text x="700" y="263" text-anchor="middle" font-size="10" fill="#60a5fa">← "legal domain, call delegate_to_legal_agent"</text>

  <!-- ===== STEP 3 ===== -->
  <text x="30" y="295" font-size="11" font-weight="700" fill="#64748b">③ Discover Law Agent</text>
  <line x1="275" y1="288" x2="445" y2="288" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <line x1="445" y1="300" x2="275" y2="300" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowW)"/>
  <text x="360" y="284" text-anchor="middle" font-size="10" fill="#3b82f6">GET /discover/legal_question</text>
  <text x="360" y="308" text-anchor="middle" font-size="10" fill="#94a3b8">← http://localhost:10101</text>

  <!-- ===== STEP 4 ===== -->
  <text x="30" y="343" font-size="11" font-weight="700" fill="#64748b">④ Delegate to Law</text>
  <line x1="275" y1="336" x2="620" y2="336" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <rect x="280" y="322" width="335" height="22" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="447" y="337" text-anchor="middle" font-size="10" fill="#93c5fd">A2A msg {question, trace_id, depth=1}</text>

  <!-- ===== STEP 5 ===== -->
  <text x="30" y="385" font-size="11" font-weight="700" fill="#64748b">⑤ Law: analyze</text>
  <line x1="630" y1="375" x2="1125" y2="375" stroke="#334155" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowW)"/>
  <line x1="1125" y1="390" x2="630" y2="390" stroke="#4ade80" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowG)"/>
  <text x="878" y="372" text-anchor="middle" font-size="10" fill="#64748b">→ analyze_law node</text>
  <text x="878" y="398" text-anchor="middle" font-size="10" fill="#4ade80">← contract law analysis</text>

  <!-- ===== STEP 6 ===== -->
  <text x="30" y="432" font-size="11" font-weight="700" fill="#64748b">⑥ Law: routing check</text>
  <line x1="630" y1="425" x2="1125" y2="425" stroke="#334155" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowW)"/>
  <line x1="1125" y1="440" x2="630" y2="440" stroke="#4ade80" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowG)"/>
  <text x="878" y="422" text-anchor="middle" font-size="10" fill="#64748b">→ check_routing: needs tax &amp; compliance?</text>
  <text x="878" y="448" text-anchor="middle" font-size="10" fill="#4ade80">← &#123;"needs_tax": true, "needs_compliance": true&#125;</text>

  <!-- ===== STEP 7 (parallel) ===== -->
  <!-- parallel banner -->
  <rect x="700" y="456" width="260" height="20" rx="5" fill="#1a2e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="830" y="470" text-anchor="middle" font-size="11" font-weight="600" fill="#4ade80">Send API — Parallel Execution</text>

  <!-- Law → Tax -->
  <line x1="630" y1="490" x2="800" y2="490" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrowP)"/>
  <rect x="635" y="476" width="160" height="22" rx="4" fill="#2a1a3e" stroke="#a855f7" stroke-width="1"/>
  <text x="715" y="491" text-anchor="middle" font-size="10" fill="#d8b4fe">A2A {trace_id, depth=2}</text>

  <!-- Law → Compliance -->
  <line x1="630" y1="515" x2="980" y2="515" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowA)"/>
  <rect x="635" y="501" width="340" height="22" rx="4" fill="#2a1e10" stroke="#f59e0b" stroke-width="1"/>
  <text x="805" y="516" text-anchor="middle" font-size="10" fill="#fde68a">A2A {trace_id, depth=2}</text>

  <!-- ===== STEP 8: Tax LLM ===== -->
  <text x="30" y="557" font-size="11" font-weight="700" fill="#64748b">⑧ Tax analysis</text>
  <line x1="810" y1="548" x2="1125" y2="548" stroke="#334155" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowW)"/>
  <line x1="1125" y1="562" x2="810" y2="562" stroke="#c084fc" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowP)"/>
  <text x="968" y="545" text-anchor="middle" font-size="10" fill="#64748b">→ LLM: IRS, IRC penalties, FBAR...</text>
  <text x="968" y="570" text-anchor="middle" font-size="10" fill="#c084fc">← tax_result text</text>

  <!-- ===== STEP 9: Compliance LLM ===== -->
  <text x="30" y="605" font-size="11" font-weight="700" fill="#64748b">⑨ Compliance analysis</text>
  <line x1="990" y1="595" x2="1125" y2="595" stroke="#334155" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowW)"/>
  <line x1="1125" y1="610" x2="990" y2="610" stroke="#fbbf24" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowA)"/>
  <text x="1058" y="592" text-anchor="middle" font-size="10" fill="#64748b">→ LLM: SEC, GDPR...</text>
  <text x="1058" y="618" text-anchor="middle" font-size="10" fill="#fbbf24">← compliance_result</text>

  <!-- ===== STEP 10: Results back to Law ===== -->
  <line x1="800" y1="632" x2="640" y2="632" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <line x1="980" y1="648" x2="640" y2="648" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <text x="30" y="640" font-size="11" font-weight="700" fill="#64748b">⑩ Results merged</text>
  <text x="710" y="629" text-anchor="middle" font-size="10" fill="#a855f7">tax_result via _last_wins reducer</text>
  <text x="800" y="655" text-anchor="middle" font-size="10" fill="#f59e0b">compliance_result via _last_wins reducer</text>

  <!-- ===== STEP 11: Aggregate ===== -->
  <text x="30" y="693" font-size="11" font-weight="700" fill="#64748b">⑪ Aggregate</text>
  <line x1="630" y1="685" x2="1125" y2="685" stroke="#334155" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowW)"/>
  <line x1="1125" y1="700" x2="630" y2="700" stroke="#4ade80" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowG)"/>
  <text x="878" y="682" text-anchor="middle" font-size="10" fill="#64748b">→ aggregate: synthesize 3 analyses</text>
  <text x="878" y="708" text-anchor="middle" font-size="10" fill="#4ade80">← final_answer (comprehensive legal response)</text>

  <!-- ===== STEP 12: Return to Customer ===== -->
  <text x="30" y="741" font-size="11" font-weight="700" fill="#64748b">⑫ Return to Customer</text>
  <line x1="620" y1="733" x2="285" y2="733" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <rect x="285" y="720" width="330" height="22" rx="4" fill="#1a2e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="450" y="735" text-anchor="middle" font-size="10" fill="#86efac">A2A Task artifact: TextPart(final_answer)</text>

  <!-- ===== STEP 13: Return to User ===== -->
  <text x="30" y="778" font-size="11" font-weight="700" fill="#64748b">⑬ Response to User</text>
  <line x1="265" y1="770" x2="105" y2="770" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowW)"/>
  <rect x="105" y="757" width="155" height="22" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="182" y="772" text-anchor="middle" font-size="10" fill="#94a3b8">Formatted legal analysis</text>

  <!-- ===== BOTTOM: Metadata panel ===== -->
  <rect x="30" y="798" width="1140" height="48" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="600" y="816" text-anchor="middle" font-size="11" font-weight="700" fill="#f1f5f9">Trace Metadata Propagated Through All Hops</text>
  <text x="200" y="836" text-anchor="middle" font-size="11" fill="#fbbf24">trace_id: "abc-123..."</text>
  <text x="440" y="836" text-anchor="middle" font-size="11" fill="#94a3b8">context_id: "ctx-xyz" (LangGraph thread_id)</text>
  <text x="720" y="836" text-anchor="middle" font-size="11" fill="#f87171">depth: 0 → 1 → 2</text>
  <text x="960" y="836" text-anchor="middle" font-size="11" fill="#64748b">MAX_DELEGATION_DEPTH = 3 (guard)</text>
</svg>