name: Production Readiness CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f 06-lab-complete/requirements.txt ]; then pip install -r 06-lab-complete/requirements.txt; fi

    - name: Run Production Readiness Checker
      run: |
        python 06-lab-complete/check_production_ready.py
